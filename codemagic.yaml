workflows:
  ios-release:
    name: iOS Release (Auto Signing)
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

  admin-web:
    name: Admin Panel Web (Hostinger)
    instance_type: linux_x2
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Build admin panel (Flutter Web)
        script: |
          cd girgo_admin
          flutter pub get
          flutter build web --release

      - name: Package build output
        script: |
          cd girgo_admin/build
          zip -r web.zip web

    artifacts:
      - girgo_admin/build/web/**
      - girgo_admin/build/web.zip