# Codemagic: build Girgo iOS and upload to App Store Connect.
# In Codemagic: add Apple Developer / App Store Connect integration,
# enable iOS code signing (distribution certificate + App Store profile for com.anamaya.girgo).

workflows:
  default:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.anamaya.girgo
    scripts:
      - name: Install Flutter
        script: |
          set -e
          cd girgo_flutter
          flutter --version
      - name: Install dependencies
        script: |
          set -e
          cd girgo_flutter
          flutter pub get
      - name: CocoaPods (if Podfile present)
        script: |
          set -e
          cd girgo_flutter/ios
          if [ -f Podfile ]; then pod install; fi
      - name: Apply iOS code signing
        script: |
          set -e
          cd girgo_flutter/ios
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -e
          cd girgo_flutter
          flutter build ipa --release
    artifacts:
      - girgo_flutter/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Configure the "App Store Connect" integration in Codemagic team settings.
        auth: integration
        submit_to_testflight: true
        # Set to true when you want to send the same build to App Review / Production:
        # submit_to_app_store: false
