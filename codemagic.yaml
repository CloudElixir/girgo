workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: girgo_flutter
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.anamaya.girgo
    scripts:
      - name: Install dependencies
        script: |
          set -e
          flutter pub get
      - name: Set up code signing settings on Xcode project
        script: |
          set -e
          cd ios
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
