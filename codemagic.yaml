workflows:
  ios-release:
    name: iOS Release (Manual Signing)
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: girgo_flutter
    environment:
      groups:
        - manual_code_signing # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialize keychain
        script: |
          set -e
          keychain initialize

      - name: Install signing certificate
        script: |
          set -e
          # CM_CERTIFICATE must be base64 of a .p12 file (not .cer).
          # Strip whitespace/newlines to avoid corrupt base64 decoding.
          printf "%s" "$CM_CERTIFICATE" | tr -d '\n\r\t ' | base64 --decode > /tmp/certificate.p12

          # Validate that the decoded file is a PKCS#12 before importing.
          openssl pkcs12 -in /tmp/certificate.p12 -passin pass:"$CM_CERTIFICATE_PASSWORD" -noout
          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"

      - name: Install provisioning profile (Girgo App Store NEW)
        script: |
          set -e
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          echo "Provisioning profile installed at: $PROFILE_PATH"

      - name: Install dependencies
        script: |
          set -e
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios
          pod install

      - name: Set up code signing settings on Xcode project
        script: |
          set -e
          cd ios
          xcode-project use-profiles --archive-method app-store
      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
