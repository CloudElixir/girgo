name: girgo
description: "Girgo - Pure. Fresh. Everyday. A dairy and grocery delivery app."
publish_to: 'none'
version: 1.0.0+20

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^12.1.3
  
  # Firebase
  firebase_core: ^3.15.2
  firebase_core_web: ^2.24.1
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.2.10
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^7.0.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0
  
  # Payment
  razorpay_flutter: ^1.3.2
  
  # Location & Maps
  geolocator: ^10.1.0
  google_places_flutter: ^2.0.9
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Utils
  crypto: ^3.0.6
  intl: ^0.18.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.2
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  image_path: "singup/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - singup/logo.png
    - singup/homebg.PNG
    - homeicon/milkhome.PNG
    - homeicon/gheehom.PNG
    - homeicon/paneerhome.PNG
    - homeicon/cakehome.PNG
    - homeicon/dungdiya.PNG
    - homeicon/dhoopstikchome.PNG
    - homeicon/gomurahome.PNG
    - Products/A2 DESI GIR COW MILK.jpg
    - Products/A2 BILONA GHEE.jpg
    - Products/A2 Desi Paneer.jpg
    - Products/PANCHGAVYA COW DUNG CAKE.jpg
    - Products/COW DUNG DIYAS (LAMPS).jpg
    - Products/HERBAL DHOOP STICKS.jpg
    - Products/GOMUTRA (COW URINE).jpg
